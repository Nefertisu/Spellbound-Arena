services:
  postgres:
    image: postgres:17-alpine
    container_name: spellbound-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spellbound
      POSTGRES_PASSWORD: spellbound
      POSTGRES_DB: spellbound
    ports:
      - '5432:5432'
    volumes:
      - spellbound_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spellbound -d spellbound']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  spellbound_pg_data:
